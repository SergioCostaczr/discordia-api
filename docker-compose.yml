services:
  postgres:
    image: postgres:16
    container_name: discordia-postgres
    environment:
      POSTGRES_DB: discordia
      POSTGRES_USER: discordia
      POSTGRES_PASSWORD: discordia
    ports:
      - "5432:5432"

  rabbitmq:
    image: rabbitmq:3-management
    container_name: discordia-rabbitmq
    ports:
      - "5672:5672"    # AMQP
      - "15672:15672"  # painel web