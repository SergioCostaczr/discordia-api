<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8"/>
  <title>Discordia — Chat Test</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/sockjs-client/1.6.1/sockjs.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/stomp.js/2.3.3/stomp.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: sans-serif; background: #1a1a1a; color: #eee; display: flex; flex-direction: column; height: 100vh; }
    header { background: #111; padding: 14px 20px; font-size: 16px; font-weight: bold; border-bottom: 1px solid #333; }
    .setup { padding: 16px 20px; background: #222; border-bottom: 1px solid #333; display: flex; gap: 10px; flex-wrap: wrap; align-items: flex-end; }
    .setup label { font-size: 12px; color: #aaa; display: flex; flex-direction: column; gap: 4px; }
    .setup input { background: #333; border: 1px solid #444; color: #eee; padding: 6px 10px; border-radius: 5px; font-size: 13px; width: 220px; }
    .setup input.wide { width: 340px; }
    button { padding: 7px 16px; border: none; border-radius: 5px; cursor: pointer; font-size: 13px; font-weight: 500; }
    #btn-connect { background: #2d7d46; color: #fff; }
    #btn-connect.connected { background: #7d2d2d; }
    #btn-connect.connected::before { content: "Desconectar" }
    #btn-connect:not(.connected)::before { content: "Conectar" }
    .status { font-size: 12px; padding: 6px 12px; border-radius: 4px; align-self: flex-end; }
    .status.ok { background: #1a3a25; color: #4caf7d; }
    .status.err { background: #3a1a1a; color: #f47070; }
    .status.idle { background: #2a2a2a; color: #888; }
    .chat-area { flex: 1; overflow-y: auto; padding: 16px 20px; display: flex; flex-direction: column; gap: 8px; }
    .msg { background: #2a2a2a; border-radius: 8px; padding: 8px 12px; max-width: 70%; }
    .msg .meta { font-size: 11px; color: #888; margin-bottom: 3px; }
    .msg .meta span { color: #7cb8f0; font-weight: 500; }
    .msg .text { font-size: 14px; }
    .msg.mine { align-self: flex-end; background: #1a3040; }
    .msg.system { align-self: center; background: transparent; color: #666; font-size: 12px; font-style: italic; }
    .input-row { display: flex; gap: 8px; padding: 12px 20px; background: #1a1a1a; border-top: 1px solid #333; }
    .input-row input { flex: 1; background: #2a2a2a; border: 1px solid #444; color: #eee; padding: 10px 14px; border-radius: 8px; font-size: 14px; }
    #btn-send { background: #2255cc; color: #fff; padding: 10px 20px; }
    #btn-send:disabled { opacity: 0.4; cursor: default; }
    .log { background: #111; font-size: 11px; font-family: monospace; padding: 8px 14px; color: #666; border-top: 1px solid #222; max-height: 80px; overflow-y: auto; }
  </style>
</head>
<body>

<header>🎮 Discordia — Chat Test Client</header>

<div class="setup">
  <label>
    JWT Token
    <input id="token" class="wide" placeholder="Cole o token aqui"/>
  </label>
  <label>
    Room ID
    <input id="roomId" placeholder="UUID da sala"/>
  </label>
  <label>
    Username (só pra label)
    <input id="username" placeholder="seu username" style="width:140px"/>
  </label>
  <button id="btn-connect" onclick="toggleConnect()"></button>
  <div id="status" class="status idle">Desconectado</div>
</div>

<div class="chat-area" id="chat"></div>

<div class="input-row">
  <input id="msg-input" placeholder="Digite uma mensagem..." onkeydown="if(event.key==='Enter') sendMsg()" disabled/>
  <button id="btn-send" onclick="sendMsg()" disabled>Enviar</button>
</div>

<div class="log" id="log"></div>

<script>
  let stompClient = null;
  let connected = false;

  function log(text) {
    const el = document.getElementById('log');
    el.innerHTML += `<div>${new Date().toLocaleTimeString()} — ${text}</div>`;
    el.scrollTop = el.scrollHeight;
  }

  function addMessage(data, mine = false, system = false) {
    const chat = document.getElementById('chat');
    const div = document.createElement('div');
    if (system) {
      div.className = 'msg system';
      div.textContent = data;
    } else {
      div.className = 'msg' + (mine ? ' mine' : '');
      div.innerHTML = `
        <div class="meta"><span>${data.senderUsername}</span> · ${new Date(data.sentAt).toLocaleTimeString()}</div>
        <div class="text">${data.content}</div>
      `;
    }
    chat.appendChild(div);
    chat.scrollTop = chat.scrollHeight;
  }

  function setStatus(text, type) {
    const el = document.getElementById('status');
    el.textContent = text;
    el.className = 'status ' + type;
  }

  function toggleConnect() {
    if (connected) {
      disconnect();
    } else {
      connect();
    }
  }

  function connect() {
    const token  = document.getElementById('token').value.trim();
    const roomId = document.getElementById('roomId').value.trim();

    if (!token || !roomId) {
      alert('Preencha o Token e o Room ID.');
      return;
    }

    const socket = new SockJS('http://localhost:8080/ws');
    stompClient = Stomp.over(socket);
    stompClient.debug = (msg) => log(msg);

    stompClient.connect(
      { Authorization: 'Bearer ' + token },
      function () {
        connected = true;
        document.getElementById('btn-connect').classList.add('connected');
        document.getElementById('msg-input').disabled = false;
        document.getElementById('btn-send').disabled = false;
        setStatus('Conectado ✓', 'ok');
        addMessage('Conectado à sala ' + roomId, false, true);
        log('Conectado. Inscrevendo em /topic/room/' + roomId);

        stompClient.subscribe('/topic/room/' + roomId, function (frame) {
          const msg = JSON.parse(frame.body);
          const me = document.getElementById('username').value.trim();
          addMessage(msg, msg.senderUsername === me);
          log('Mensagem recebida de ' + msg.senderUsername);
        });
      },
      function (error) {
        setStatus('Erro de conexão', 'err');
        log('Erro: ' + error);
        connected = false;
      }
    );
  }

  function disconnect() {
    if (stompClient) stompClient.disconnect();
    connected = false;
    document.getElementById('btn-connect').classList.remove('connected');
    document.getElementById('msg-input').disabled = true;
    document.getElementById('btn-send').disabled = true;
    setStatus('Desconectado', 'idle');
    addMessage('Desconectado da sala.', false, true);
  }

  function sendMsg() {
    const input  = document.getElementById('msg-input');
    const roomId = document.getElementById('roomId').value.trim();
    const content = input.value.trim();

    if (!content || !connected) return;

    stompClient.send('/app/chat/' + roomId, {}, JSON.stringify({ content }));
    input.value = '';
    log('Mensagem enviada para /app/chat/' + roomId);
  }
</script>
</body>
</html>
