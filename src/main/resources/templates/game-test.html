<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<title>Discordia — Game Test</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/sockjs-client/1.6.1/sockjs.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/stomp.js/2.3.3/stomp.min.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&family=Syne:wght@400;700;800&display=swap');

  :root {
    --bg: #0d0d0f;
    --surface: #16161a;
    --border: #2a2a32;
    --accent: #7c6af7;
    --accent2: #f76a8a;
    --green: #4af7a0;
    --amber: #f7c84a;
    --text: #e8e6f0;
    --muted: #6b6880;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Syne', sans-serif;
    min-height: 100vh;
    display: grid;
    grid-template-columns: 340px 1fr;
    grid-template-rows: 56px 1fr;
  }

  /* HEADER */
  header {
    grid-column: 1/-1;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    padding: 0 24px;
    gap: 12px;
  }
  header h1 { font-size: 18px; font-weight: 800; letter-spacing: -0.5px; }
  header h1 span { color: var(--accent); }
  .badge {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    padding: 3px 8px;
    border-radius: 4px;
    font-weight: 600;
    letter-spacing: 0.5px;
  }
  .badge-off  { background: #2a2a32; color: var(--muted); }
  .badge-on   { background: #1a2e20; color: var(--green); }

  /* SIDEBAR */
  aside {
    background: var(--surface);
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  .panel { padding: 20px; border-bottom: 1px solid var(--border); }
  .panel-title {
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 14px;
  }

  input, textarea {
    width: 100%;
    background: var(--bg);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 9px 12px;
    border-radius: 6px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    margin-bottom: 8px;
    transition: border-color .15s;
  }
  input:focus, textarea:focus {
    outline: none;
    border-color: var(--accent);
  }
  textarea { resize: vertical; min-height: 60px; }
  input::placeholder, textarea::placeholder { color: var(--muted); }

  .label {
    font-size: 10px;
    font-weight: 700;
    color: var(--muted);
    letter-spacing: 1px;
    text-transform: uppercase;
    display: block;
    margin-bottom: 5px;
  }

  button {
    font-family: 'Syne', sans-serif;
    font-weight: 700;
    font-size: 12px;
    letter-spacing: 0.5px;
    border: none;
    border-radius: 6px;
    padding: 9px 16px;
    cursor: pointer;
    transition: all .15s;
  }
  button:disabled { opacity: .35; cursor: default; }
  .btn-primary { background: var(--accent); color: #fff; width: 100%; }
  .btn-primary:hover:not(:disabled) { background: #9381ff; }
  .btn-danger { background: #3d1a25; color: var(--accent2); width: 100%; }
  .btn-danger:hover:not(:disabled) { background: #5a2235; }
  .btn-sm { padding: 6px 12px; font-size: 11px; }

  /* MOVE BUTTONS */
  .moves { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; margin-top: 8px; }
  .btn-move {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
    padding: 14px 8px;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text);
    font-size: 22px;
    transition: all .15s;
  }
  .btn-move span { font-size: 10px; font-weight: 700; letter-spacing: 1px; color: var(--muted); }
  .btn-move:hover:not(:disabled) { border-color: var(--accent); background: #1a1730; transform: translateY(-2px); }
  .btn-move.selected { border-color: var(--accent); background: #1a1730; box-shadow: 0 0 0 1px var(--accent); }

  /* CHALLENGE SECTION */
  .challenge-box {
    background: #1a1420;
    border: 1px solid #3d2060;
    border-radius: 8px;
    padding: 14px;
    margin-top: 8px;
  }
  .challenge-box p { font-size: 12px; color: var(--text); margin-bottom: 10px; line-height: 1.5; }
  .challenge-box p strong { color: var(--accent); }

  /* LOG */
  .log-panel {
    flex: 1;
    overflow-y: auto;
    padding: 12px 16px;
    display: flex;
    flex-direction: column;
    gap: 4px;
  }
  .log-item {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    color: var(--muted);
    line-height: 1.5;
    word-break: break-all;
  }
  .log-item.in  { color: #4a9ef7; }
  .log-item.out { color: var(--accent); }
  .log-item.err { color: var(--accent2); }
  .log-item.ok  { color: var(--green); }
  .log-item .ts { opacity: .5; margin-right: 6px; }

  /* MAIN AREA */
  main {
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  /* GAME ARENA */
  .arena {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 20px;
    padding: 32px;
  }

  .arena-title {
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: var(--muted);
  }

  .vs-board {
    display: grid;
    grid-template-columns: 1fr auto 1fr;
    align-items: center;
    gap: 32px;
    width: 100%;
    max-width: 560px;
  }

  .player-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 24px 20px;
    text-align: center;
    transition: border-color .3s;
  }
  .player-card.winner { border-color: var(--green); box-shadow: 0 0 24px rgba(74,247,160,.1); }
  .player-card.loser  { border-color: var(--accent2); opacity: .6; }
  .player-card.draw   { border-color: var(--amber); }

  .player-name { font-size: 13px; font-weight: 700; margin-bottom: 8px; }
  .player-move { font-size: 48px; margin: 12px 0; min-height: 60px; }
  .player-role { font-size: 10px; color: var(--muted); letter-spacing: 1px; text-transform: uppercase; }

  .vs-label {
    font-size: 24px;
    font-weight: 800;
    color: var(--border);
    letter-spacing: -1px;
  }

  /* STATUS BAR */
  .status-bar {
    padding: 12px 24px;
    background: var(--surface);
    border-top: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .status-text {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: var(--muted);
    flex: 1;
  }
  .status-text strong { color: var(--text); }

  .result-banner {
    padding: 10px 20px;
    border-radius: 8px;
    font-size: 13px;
    font-weight: 700;
    text-align: center;
    display: none;
  }
  .result-banner.show { display: block; }
  .result-banner.win  { background: #0d2b1a; color: var(--green); border: 1px solid #1a5a35; }
  .result-banner.lose { background: #2b0d1a; color: var(--accent2); border: 1px solid #5a1a35; }
  .result-banner.draw { background: #2b2200; color: var(--amber); border: 1px solid #5a4800; }

  .section-gap { height: 12px; }

  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  .dot {
    width: 7px; height: 7px; border-radius: 50%;
    display: inline-block; margin-right: 6px;
  }
  .dot-off { background: var(--muted); }
  .dot-on  { background: var(--green); animation: pulse 2s infinite; }

  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: .4; }
  }
</style>
</head>
<body>

<header>
  <h1>discordia <span>⚔</span> game test</h1>
  <div id="conn-badge" class="badge badge-off"><span class="dot dot-off" id="dot"></span>DESCONECTADO</div>
</header>

<!-- SIDEBAR -->
<aside>

  <div class="panel">
    <div class="panel-title">Conexão</div>
    <span class="label">JWT Token</span>
    <textarea id="token" placeholder="Cole o token JWT aqui..."></textarea>
    <span class="label">Username</span>
    <input id="username" placeholder="seu username"/>
    <div class="section-gap"></div>
    <button class="btn-primary" id="btn-connect" onclick="toggleConnect()">Conectar</button>
  </div>

  <div class="panel">
    <div class="panel-title">Desafio</div>
    <span class="label">Room ID</span>
    <input id="roomId" placeholder="UUID da sala"/>
    <span class="label">Challenged User ID</span>
    <input id="challengedId" placeholder="UUID do usuário a desafiar"/>
    <div class="section-gap"></div>
    <button class="btn-primary btn-sm" id="btn-challenge" onclick="sendChallenge()" disabled>⚔ Enviar Desafio</button>

    <div id="challenge-incoming" class="challenge-box" style="display:none">
      <p>Desafio recebido de <strong id="challenger-name">—</strong></p>
      <button class="btn-primary btn-sm" onclick="acceptChallenge()">Aceitar e jogar</button>
    </div>
  </div>

  <div class="panel">
    <div class="panel-title">Jogada</div>
    <span class="label" id="round-label" style="color:var(--muted)">Aguardando partida...</span>
    <div class="moves">
      <button class="btn-move" id="btn-rock"     onclick="sendMove('ROCK')"     disabled>🪨<span>ROCK</span></button>
      <button class="btn-move" id="btn-paper"    onclick="sendMove('PAPER')"    disabled>📄<span>PAPER</span></button>
      <button class="btn-move" id="btn-scissors" onclick="sendMove('SCISSORS')" disabled>✂️<span>SCISSORS</span></button>
    </div>
  </div>

  <div class="panel-title" style="padding:12px 20px 6px">LOG</div>
  <div class="log-panel" id="log"></div>

</aside>

<!-- MAIN -->
<main>
  <div class="arena">
    <div class="arena-title">Arena</div>

    <div class="vs-board">
      <div class="player-card" id="card-challenger">
        <div class="player-name" id="name-challenger">—</div>
        <div class="player-move" id="move-challenger">❓</div>
        <div class="player-role">Desafiante</div>
      </div>

      <div class="vs-label">VS</div>

      <div class="player-card" id="card-challenged">
        <div class="player-name" id="name-challenged">—</div>
        <div class="player-move" id="move-challenged">❓</div>
        <div class="player-role">Desafiado</div>
      </div>
    </div>

    <div id="result-banner" class="result-banner"></div>
  </div>

  <div class="status-bar">
    <div class="status-text" id="status-text">Conecte-se para começar.</div>
  </div>
</main>

<script>
const MOVE_EMOJI = { ROCK: '🪨', PAPER: '📄', SCISSORS: '✂️' };
let stomp = null, connected = false;
let currentRoundId = null, pendingRoundId = null;
let myUsername = '';

function ts() {
  return new Date().toLocaleTimeString('pt-BR', { hour: '2-digit', minute: '2-digit', second: '2-digit' });
}

function log(msg, type = '') {
  const el = document.getElementById('log');
  const d = document.createElement('div');
  d.className = 'log-item ' + type;
  d.innerHTML = `<span class="ts">${ts()}</span>${msg}`;
  el.appendChild(d);
  el.scrollTop = el.scrollHeight;
}

function setStatus(text) {
  document.getElementById('status-text').innerHTML = text;
}

function toggleConnect() {
  connected ? disconnect() : connect();
}

function connect() {
  const token = document.getElementById('token').value.trim();
  myUsername  = document.getElementById('username').value.trim();
  if (!token || !myUsername) { alert('Preencha Token e Username.'); return; }

  const socket = new SockJS('http://localhost:8080/ws');
  stomp = Stomp.over(socket);
  stomp.debug = null;

  log('Conectando...', '');

  stomp.connect({ Authorization: 'Bearer ' + token }, function() {
    connected = true;
    document.getElementById('btn-connect').textContent = 'Desconectar';
    document.getElementById('btn-connect').className = 'btn-danger';
    document.getElementById('conn-badge').className = 'badge badge-on';
    document.getElementById('conn-badge').innerHTML = '<span class="dot dot-on"></span>CONECTADO';
    document.getElementById('btn-challenge').disabled = false;
    setStatus('Conectado como <strong>' + myUsername + '</strong>');
    log('Conectado como ' + myUsername, 'ok');

    // escuta desafios recebidos
    stomp.subscribe('/user/queue/challenges', function(frame) {
      const data = JSON.parse(frame.body);
      log('Desafio recebido de ' + data.challengerUsername + ' | round: ' + data.roundId, 'in');
      pendingRoundId = data.roundId;
      document.getElementById('challenger-name').textContent = data.challengerUsername;
      document.getElementById('challenge-incoming').style.display = 'block';
      setStatus('⚔ Desafio recebido de <strong>' + data.challengerUsername + '</strong>');
    });

    // escuta resultados
    stomp.subscribe('/user/queue/game-results', function(frame) {
      const data = JSON.parse(frame.body);
      log('Resultado recebido: ' + JSON.stringify(data), 'in');
      showResult(data);
    });

    log('Inscrito em /user/queue/challenges e /user/queue/game-results', 'ok');

  }, function(err) {
    log('Erro de conexão: ' + err, 'err');
    setStatus('Erro ao conectar.');
  });
}

function disconnect() {
  if (stomp) stomp.disconnect();
  connected = false;
  document.getElementById('btn-connect').textContent = 'Conectar';
  document.getElementById('btn-connect').className = 'btn-primary';
  document.getElementById('conn-badge').className = 'badge badge-off';
  document.getElementById('conn-badge').innerHTML = '<span class="dot dot-off"></span>DESCONECTADO';
  document.getElementById('btn-challenge').disabled = true;
  disableMoves();
  setStatus('Desconectado.');
  log('Desconectado.', 'err');
}

function sendChallenge() {
  const roomId      = document.getElementById('roomId').value.trim();
  const challengedId = document.getElementById('challengedId').value.trim();
  if (!roomId || !challengedId) { alert('Preencha Room ID e Challenged User ID.'); return; }

  const token = document.getElementById('token').value.trim();

  fetch('http://localhost:8080/api/games/challenge', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + token },
    body: JSON.stringify({ roomId, challengedUserId: challengedId })
  })
  .then(r => r.json())
  .then(data => {
    currentRoundId = data.roundId;
    log('Desafio enviado | round: ' + data.roundId, 'out');
    setStatus('Desafio enviado para <strong>' + data.challengedUsername + '</strong>. Aguardando jogadas...');
    resetArena(data.challengerUsername, data.challengedUsername);
    enableMoves();
  })
  .catch(e => log('Erro ao enviar desafio: ' + e, 'err'));
}

function acceptChallenge() {
  currentRoundId = pendingRoundId;
  document.getElementById('challenge-incoming').style.display = 'none';
  enableMoves();
  setStatus('Partida aceita! Escolha sua jogada.');
  log('Partida aceita | round: ' + currentRoundId, 'ok');
}

function sendMove(move) {
  if (!currentRoundId) { alert('Nenhuma partida ativa.'); return; }

  ['rock','paper','scissors'].forEach(m =>
    document.getElementById('btn-' + m).classList.remove('selected')
  );
  document.getElementById('btn-' + move.toLowerCase()).classList.add('selected');

  stomp.send('/app/game/move', {}, JSON.stringify({ roundId: currentRoundId, move }));
  log('Jogada enviada: ' + move + ' | round: ' + currentRoundId, 'out');
  setStatus('Jogada <strong>' + move + '</strong> enviada. Aguardando adversário...');
  disableMoves();
}

function enableMoves() {
  ['rock','paper','scissors'].forEach(m => document.getElementById('btn-' + m).disabled = false);
  document.getElementById('round-label').textContent = 'Round: ' + (currentRoundId || '').slice(0,8) + '...';
  document.getElementById('round-label').style.color = 'var(--text)';
}

function disableMoves() {
  ['rock','paper','scissors'].forEach(m => {
    document.getElementById('btn-' + m).disabled = true;
    document.getElementById('btn-' + m).classList.remove('selected');
  });
}

function resetArena(challenger, challenged) {
  document.getElementById('name-challenger').textContent = challenger;
  document.getElementById('name-challenged').textContent = challenged;
  document.getElementById('move-challenger').textContent = '❓';
  document.getElementById('move-challenged').textContent = '❓';
  document.getElementById('card-challenger').className = 'player-card';
  document.getElementById('card-challenged').className = 'player-card';
  document.getElementById('result-banner').className = 'result-banner';
}

function showResult(data) {
  document.getElementById('name-challenger').textContent = data.challengerUsername;
  document.getElementById('name-challenged').textContent = data.challengedUsername;
  document.getElementById('move-challenger').textContent = MOVE_EMOJI[data.challengerMove] || '❓';
  document.getElementById('move-challenged').textContent = MOVE_EMOJI[data.challengedMove] || '❓';

  const banner  = document.getElementById('result-banner');
  const cardCh  = document.getElementById('card-challenger');
  const cardCd  = document.getElementById('card-challenged');

  currentRoundId = null;
  document.getElementById('round-label').textContent = 'Aguardando partida...';
  document.getElementById('round-label').style.color = 'var(--muted)';

  if (!data.winnerUsername) {
    banner.textContent = '🤝 Empate!';
    banner.className = 'result-banner show draw';
    cardCh.className = 'player-card draw';
    cardCd.className = 'player-card draw';
    setStatus('Resultado: <strong>Empate!</strong>');
  } else if (data.winnerUsername === myUsername) {
    banner.textContent = '🏆 Você venceu!';
    banner.className = 'result-banner show win';
    cardCh.className = data.challengerUsername === myUsername ? 'player-card winner' : 'player-card loser';
    cardCd.className = data.challengedUsername === myUsername ? 'player-card winner' : 'player-card loser';
    setStatus('Resultado: <strong>Você venceu!</strong>');
  } else {
    banner.textContent = '💀 Você perdeu.';
    banner.className = 'result-banner show lose';
    cardCh.className = data.challengerUsername === data.winnerUsername ? 'player-card winner' : 'player-card loser';
    cardCd.className = data.challengedUsername === data.winnerUsername ? 'player-card winner' : 'player-card loser';
    setStatus('Resultado: <strong>' + data.winnerUsername + ' venceu.</strong>');
  }
}
</script>
</body>
</html>
